config:
  service:
    log_level: info
  parsers:
    # https://rubular.com/r/53IMp5f0IXbwEg
    - name: coredns
      format: regex
      regex: '^(?<log>[^"]+"(?<record_type>\w+) (?<dns_class>\w+) (?<domain>[^ ]+) (?<protocol>\w+) .*" (?<dns_response_code>\w+).*)$'
  pipeline:
    inputs:
      - name: tail
        alias: coredns
        path: /var/log/containers/coredns*.log
        tag: coredns.*
        skip_empty_lines: true

      - name: dummy
        tag: dummy.data
        dummy: '{"data":"100 0.5 true This is example", "container_name":"app", "app_name":"dummy-publising-api", "foo":"bar"}'
        rate: 100
        copies: 2
        threaded: true

      - name: dummy
        tag: dummy.data2
        dummy: '{"data":"100 0.5 true This is example", "container_name":"nginx", "app_name":"dummy-publising-api", "baz":"quux"}'
        rate: 100
        copies: 1000
        threaded: true

    filters:
      - name: parser
        match: coredns.*
        key_name: log
        parser: coredns

      - name: kubernetes
        alias: coredns
        match: coredns.*
        kube_tag_prefix: coredns.var.log.containers.
        kube_url: https://kubernetes.default.svc:443
        kube_ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        kube_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        k8s-logging.parser: on
        k8s-logging.exclude: on
        merge_log: off

    outputs:
      - name: loki
        match: "*"
        host: "loki-distributor.loki.svc.cluster.local"
        tenant_id: test
        auto_kubernetes_labels: true
        labels: service_name=$kubernetes['container_name']

      - name: stdout
        match: "*"
