name: Run Jasmine

on:
  workflow_call:
    inputs:
      useWithRails:
        description: 'Enable for use with Rails'
        required: false
        default: false
        type: boolean
    secrets:
      BUNDLER_GITHUB_TOKEN:
        required: false
        description: "Token used for Bundler to authenticate when installing gems from private Github repos"

jobs:
  run-jasmine:
    name: Run Jasmine
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          show-progress: false

      - name: Setup Ruby
        if: inputs.useWithRails
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          bundler-cache: true
        env:
          BUNDLE_GITHUB__COM: "x-access-token:${{ secrets.BUNDLER_GITHUB_TOKEN }}"

      - name: Setup Node
        uses: alphagov/govuk-infrastructure/.github/actions/setup-node@788b98389ac2003202dc421f4ccd187ad85cda17 # main

      - name: Precompile Rails assets
        if: inputs.useWithRails
        uses: alphagov/govuk-infrastructure/.github/actions/precompile-rails-assets@788b98389ac2003202dc421f4ccd187ad85cda17 # main

      - name: Run Jasmine
        run: yarn run jasmine-browser-runner runSpecs
