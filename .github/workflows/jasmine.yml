name: Run Jasmine

on:
  workflow_call:
    inputs:
      useWithRails:
        description: 'Enable for use with Rails'
        required: false
        default: false
        type: boolean
    secrets:
      BUNDLER_GITHUB_TOKEN:
        required: false
        description: "Token used for Bundler to authenticate when installing gems from private Github repos"

jobs:
  run-jasmine:
    name: Run Jasmine
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          show-progress: false

      - name: Setup Ruby
        if: inputs.useWithRails
        uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601 # v1.315.0
        with:
          bundler-cache: true
        env:
          BUNDLE_GITHUB__COM: "x-access-token:${{ secrets.BUNDLER_GITHUB_TOKEN }}"

      - name: Setup Node
        uses: alphagov/govuk-infrastructure/.github/actions/setup-node@955e86798b53da68dd7573a7fd7564636c66d89d # main

      - name: Precompile Rails assets
        if: inputs.useWithRails
        uses: alphagov/govuk-infrastructure/.github/actions/precompile-rails-assets@955e86798b53da68dd7573a7fd7564636c66d89d # main

      - name: Run Jasmine
        run: yarn run jasmine-browser-runner runSpecs
