name: Lint GitHub Actions
on:
  push:
    paths: ['.github/workflows/**', '.github/actions/**', '.github/actionlint.yml']
jobs:
  actionlint:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          show-progress: false
      - uses: alphagov/govuk-infrastructure/.github/actions/actionlint@955e86798b53da68dd7573a7fd7564636c66d89d # main
