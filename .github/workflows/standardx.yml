name: Run Standardx

on:
  workflow_call:
    inputs:
      files:
        description: 'Files(s) or glob(s) to check'
        required: false
        default: "'app/assets/javascripts/**/*.js' 'spec/javascripts/**/*.js'"
        type: string

jobs:
  run-standardx:
    name: Run Standardx
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          show-progress: false

      - name: Setup Node
        uses: alphagov/govuk-infrastructure/.github/actions/setup-node@788b98389ac2003202dc421f4ccd187ad85cda17 # main

      - name: Run Standardx
        run: yarn run standardx ${{ inputs.files }}
